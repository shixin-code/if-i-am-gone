# if-i-am-gone 配置示例 —— 复制为 config.yaml 并按需修改。
# 时间单位用 Go duration 写法：h(小时)、m(分钟)、s(秒)，如 24h、72h、30m。
# ${VAR} 占位符会从环境变量展开（见 .env.example）。

source_dir: /data/source             # 挂载进容器、待打包加密的目录
state_dir: /data/state               # state.db、加密包、日志的存放目录

# 目标流程配置：当前调度主流程读取这些字段。
target_flow:
  checkin_day_of_month: 1            # 每月几号发送安全确认
  reminder_count: 7                  # 未确认后连续提醒几次
  reminder_interval: 24h             # 两次提醒间隔（Go duration: 1m/2h/24h；测试可设 1m 快速演练）
  password_delay_after_warn: 72h     # 预提醒邮件成功后多久发送密码
  file_delay_after_password: 168h    # 密码邮件成功后多久发送下载链接
  timezone: Asia/Shanghai            # 月度确认日和预计发送日期展示时区

archive:
  keep_archives: 3                   # 本地保留最近几个加密包
  password_length: 32                # 随机密码长度
  large_file_threshold: 20MB         # 目标流程不再按大小判断，统一发送下载链接

telegram:
  bot_token: ${TELEGRAM_BOT_TOKEN}   # 找 @BotFather 创建 bot 获取
  chat_id: 123456789                 # 仅此 chat_id 的确认被接受（防冒充）

smtp:
  host: smtp.example.com
  port: 465
  use_ssl: true                      # 465 用隐式 TLS；587 设为 false 走 STARTTLS
  username: me@example.com
  password: ${SMTP_PASSWORD}         # 多数邮箱用「授权码」
  from_name: "意外开关"
  from_email: me@example.com

beneficiaries:                       # 受益人（家人）列表
  - {name: "张三", email: zhangsan@example.com, lang: zh}
  - {name: "李四", email: lisi@example.com,     lang: zh}

download:
  mode: self_hosted                  # self_hosted | s3
  link_expiry: 336h                  # 下载链接有效期（14天）
  max_downloads: 5
  self_hosted:
    public_base_url: https://my-vps.example.com
    listen_port: 8080
  s3:
    endpoint: https://s3.amazonaws.com # S3-compatible endpoint，如 MinIO/R2/OSS 兼容端点
    bucket: my-deadman-bucket
    region: us-east-1
    access_key: ${S3_ACCESS_KEY}
    secret_key: ${S3_SECRET_KEY}
    presign_expiry: 168h

state_protection:
  encrypt_password_field: false      # true 时加密 state.db 中保存的归档密码
  master_passphrase: ${MASTER_PASSPHRASE}

reliability:
  heartbeat_enabled: true
  heartbeat_interval: 168h           # 每 7 天给用户发一次"系统还活着"
  healthcheck:
    enabled: false                    # true 时定时访问第三方探活 ping URL
    ping_url: ${HEALTHCHECK_PING_URL} # 例如 https://hc-ping.com/你的-uuid
    interval: 10m
    timeout: 10s

logging:
  level: INFO
  file: /data/state/app.log

templates:
  zh:
    checkin_telegram: "本月安全确认：如果你一切正常，请点击下方按钮完成确认。"
    checkin_button_text: "确认正常"
    checkin_accepted_reply: "本月已确认，祝君安康！"
    checkin_expired_reply: "此确认已过期，请用最新的确认消息"
    checkin_error_reply: "处理出错，请稍后再试"
    daily_reminder_telegram: |
      安全确认提醒：系统已<N>天没收到你的确认。
      如果你一切正常，请点击最新确认消息中的“确认正常”按钮。
    final_reminder_telegram: |
      安全确认提醒：这是本轮连续提醒的最后一天。
      如果你一切正常，请尽快点击最新确认消息中的“确认正常”按钮。若仍未确认，系统将进入预设通知流程。
    warn_stage_telegram: |
      阶段提醒：系统即将向受益人发送预提醒邮件。
      如果你一切正常，请立即点击最新安全确认消息中的“确认正常”按钮，系统会暂停后续流程。
    password_stage_telegram: |
      阶段提醒：系统即将打包文件，并向受益人发送解压密码。
      如果你一切正常，请立即点击最新安全确认消息中的“确认正常”按钮，系统会暂停后续流程。
    file_stage_telegram: |
      阶段提醒：系统即将向受益人发送加密文件下载链接。
      如果你一切正常，请立即点击最新安全确认消息中的“确认正常”按钮，系统会暂停后续流程。
    cancel_flow_telegram: "本月已确认，后续流程已暂停。"
    heartbeat_telegram: "系统巡检正常：服务正在按计划运行。若长期收不到此消息，请检查服务器是否在线。"
    warn_email_subject: "[重要] 一封预定的信息"
    warn_email_body: |
      您好 {name}，

      这是一封由 {owner} 预先设置的自动邮件。{owner} 设置了一套机制：若他/她本人长期未完成安全确认，系统会按预设流程向您传递重要信息。

      目前系统已经连续多天未收到 {owner} 的安全确认。

      如果接下来仍未收到 {owner} 的安全确认，系统将按配置继续执行：

      - 预计在 {password_delay_text} 后即 {password_send_date} 给您发送重要文件的解压密码，请妥善保管。
      - 预计在密码发送后 {file_delay_text} 即 {file_link_send_date} 给您发送加密文件下载链接，下载后可使用届时收到的密码解密。此日期为当前预估值，实际日期会在密码邮件中重新确认。

      解压加密文件需要使用 7-Zip 或 WinRAR。Windows 自带解压工具通常不支持此类 AES 加密 ZIP。

      若这是误触发，{owner} 仍可通过 Telegram 确认暂停后续流程，您可能不会再收到后续邮件。
    password_email_subject: "[重要] 解压密码"
    password_email_body: |
      您好 {name}，

      这是此前预提醒邮件中提到的解压密码：

      {password}

      请妥善保存。预计在 {file_delay_text} 后即 {file_link_send_date}，您会收到加密文件下载链接。下载文件后，请使用此密码并通过 7-Zip 或 WinRAR 解压。若不确定如何操作，请联系设置人预留的管理员或可信家人获取解压说明。
    file_email_subject: "[重要] 加密文件下载链接"
    file_email_body_link: |
      您好 {name}，

      请通过以下链接下载加密文件：

      {url}

      链接有效期：{expiry}
      最多下载次数：{max_downloads}

      请使用此前收到的解压密码，并通过 7-Zip 或 WinRAR 解压。若不确定如何操作，请联系设置人预留的管理员或可信家人获取解压说明。
