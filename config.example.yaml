# if-i-am-gone 配置示例 —— 复制为 config.yaml 并按需修改。
# 时间单位用 Go duration 写法：h(小时)、m(分钟)、s(秒)，如 24h、72h、30m。
# ${VAR} 占位符会从环境变量展开（见 .env.example）。

source_dir: /data/source             # 挂载进容器、待打包加密的目录
state_dir: /data/state               # state.db、加密包、日志的存放目录

intervals:
  pack_interval: 24h                 # 多久重新打包一次（每次换新随机密码）
  checkin_interval: 24h              # 多久发一次 Telegram 确认（一个"回合"）
  miss_threshold: 5                  # 连续漏几回合 → 进入最后强提醒（5×24h≈5天）
  final_grace: 48h                   # 最后强提醒后再等多久才真正发预警邮件（关键防误判窗口）
  password_delay: 72h                # 预警邮件 → 发解压密码（阶段1→2）
  file_delay: 96h                    # 发密码 → 发压缩文件本体（阶段2→3）

archive:
  keep_archives: 3                   # 本地保留最近几个加密包
  password_length: 32                # 随机密码长度
  large_file_threshold: 20MB         # 超过此大小走下载链接（迭代2），否则邮件附件

telegram:
  bot_token: ${TELEGRAM_BOT_TOKEN}   # 找 @BotFather 创建 bot 获取
  chat_id: 123456789                 # 仅此 chat_id 的确认被接受（防冒充）

smtp:
  host: smtp.example.com
  port: 465
  use_ssl: true                      # 465 用隐式 TLS；587 设为 false 走 STARTTLS
  username: me@example.com
  password: ${SMTP_PASSWORD}         # 多数邮箱用「授权码」
  from_name: "意外开关"
  from_email: me@example.com

beneficiaries:                       # 受益人（家人）列表
  - {name: "张三", email: zhangsan@example.com, lang: zh}
  - {name: "Li Si", email: lisi@example.com,    lang: en}

download:
  mode: self_hosted                  # self_hosted | s3（s3 为迭代3）
  link_expiry: 336h                  # 下载链接有效期（14天）
  max_downloads: 5
  self_hosted:
    public_base_url: https://my-vps.example.com
    listen_port: 8080
  s3:
    endpoint: https://s3.amazonaws.com
    bucket: my-deadman-bucket
    region: us-east-1
    access_key: ${S3_ACCESS_KEY}
    secret_key: ${S3_SECRET_KEY}
    presign_expiry: 168h

state_protection:
  encrypt_password_field: false      # 迭代2：加密 state 里的包密码字段
  master_passphrase: ${MASTER_PASSPHRASE}

reliability:
  heartbeat_enabled: true
  heartbeat_interval: 168h           # 每 7 天给用户发一次"系统还活着"

logging:
  level: INFO
  file: /data/state/app.log

templates:
  zh:
    checkin_telegram: "你还活着吗？请点击下方按钮确认。若长期不确认，系统将在若干天后开始向家人传递信息。"
    final_warning_telegram: "⚠️ 最后提醒：你已连续多次未确认。若仍不确认，系统将很快开始向家人传递信息。请尽快点击最新确认消息中的按钮。"
    warn_email_subject: "[重要] 一封预定的信息"
    warn_email_body: |
      您好 {name}，

      这是一封由 {owner} 预先设置的自动邮件。{owner} 设置了一套机制：若长期与系统失联，系统将向您传递重要信息。

      接下来：约 {password_days} 天后您会收到解压密码，约 {file_days} 天后会收到加密压缩文件。
      （解压需使用 7-Zip 或 WinRAR，Windows 自带的解压不支持。）

      若这是误发，{owner} 仍可随时取消，您可能不会再收到后续邮件。
    password_email_subject: "[重要] 解压密码"
    password_email_body: |
      您好 {name}，

      解压密码为：{password}

      请妥善保存。稍后您会收到加密压缩文件，请用此密码并使用 7-Zip 或 WinRAR 解压。
    file_email_subject: "[重要] 加密文件"
    file_email_body_attach: |
      您好 {name}，

      加密文件见附件。请使用此前收到的密码，并用 7-Zip 或 WinRAR 解压。
    file_email_body_link: |
      您好 {name}，

      文件较大，请通过以下链接下载（链接 {expiry} 内有效）：
      {url}
      请用此前收到的密码，并用 7-Zip 或 WinRAR 解压。
  en:
    checkin_telegram: "Are you alive? Tap the button below to confirm. If you stop confirming, the system will begin delivering information to your family after some days."
    final_warning_telegram: "⚠️ Final reminder: you have missed several check-ins. If you do not confirm soon, the system will start delivering information to your family. Please tap the button in the latest message."
    warn_email_subject: "[Important] A pre-arranged message"
    warn_email_body: |
      Hello {name},

      This is an automated email pre-arranged by {owner}. {owner} set up a system that delivers important information if they become unreachable for a long time.

      Next: you will receive the decryption password in about {password_days} days, and the encrypted archive in about {file_days} days.
      (Extraction requires 7-Zip or WinRAR; the built-in Windows unzip does not support it.)

      If this was sent in error, {owner} can still cancel it at any time.
    password_email_subject: "[Important] Decryption password"
    password_email_body: |
      Hello {name},

      The decryption password is: {password}

      Please keep it safe. You will receive the encrypted archive shortly; use this password with 7-Zip or WinRAR to extract it.
    file_email_subject: "[Important] Encrypted file"
    file_email_body_attach: |
      Hello {name},

      The encrypted file is attached. Use the password you received earlier, with 7-Zip or WinRAR, to extract it.
    file_email_body_link: |
      Hello {name},

      The file is large; please download it via this link (valid for {expiry}):
      {url}
      Use the password you received earlier, with 7-Zip or WinRAR, to extract it.
